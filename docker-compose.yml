services:
  postgres:
    image: postgres:16-alpine
    container_name: college-compass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: college
      POSTGRES_PASSWORD: college
      POSTGRES_DB: college_discovery
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U college -d college_discovery"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
